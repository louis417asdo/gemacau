<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gemacau — 澳門數字孿生城市規劃系統</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🇲🇴</text></svg>" />
  <link rel="stylesheet" href="/src/styles/main.css" />
</head>
<body>
  <div id="cesiumContainer"></div>
  <div id="toolbar">
    <div id="toolbar-brand">Gemacau</div>
    <button class="toolbar-btn active" data-panel="layers">圖層</button>
    <button class="toolbar-btn" data-panel="analysis">分析</button>
    <button class="toolbar-btn" data-panel="sunlight">日照</button>
    <button class="toolbar-btn" data-panel="scenario">場景</button>
    <div id="analysis-submenu" class="submenu hidden">
      <button class="submenu-btn" data-analysis="density">建築密度</button>
      <button class="submenu-btn" data-analysis="far">容積率</button>
      <button class="submenu-btn" data-analysis="population">人口密度</button>
    </div>
  </div>
  <div id="sunlight-panel" class="panel hidden">
    <div class="panel-header">日照分析</div>
    <div class="panel-body">
      <button id="sunlight-toggle" class="sunlight-btn">陰影：關</button>
      <div class="sunlight-presets">
        <button class="sunlight-preset active" data-preset="summer">夏至</button>
        <button class="sunlight-preset" data-preset="winter">冬至</button>
        <button class="sunlight-preset" data-preset="equinox">春/秋分</button>
      </div>
      <div class="sunlight-info">
        <span id="sunlight-date"></span>
        <span id="sunlight-time"></span>
      </div>
      <input type="range" id="sunlight-timeline" class="sunlight-timeline" min="5" max="19" step="0.25" value="12" />
      <div class="sunlight-note">* Cesium ShadowMap 即時陰影，非工程級日照時長分析</div>
    </div>
  </div>
  <div id="scenario-panel" class="panel hidden">
    <div class="panel-header">場景切換</div>
    <div class="panel-body">
      <button class="scenario-btn active" data-scenario="current">現狀</button>
      <button class="scenario-btn" data-scenario="plan-a">重建方案 A</button>
      <button class="scenario-btn" data-scenario="plan-b">重建方案 B</button>
      <div class="scenario-note">* 重建方案為模擬數據，非官方規劃</div>
    </div>
  </div>
  <div id="simulator-panel" class="panel hidden">
    <div class="panel-header">益隆重建模擬器</div>
    <div class="panel-body">
      <div class="sim-presets">
        <button class="sim-preset active" data-floors="7">現狀 7層</button>
        <button class="sim-preset" data-floors="15">方案A 15層</button>
        <button class="sim-preset" data-floors="25">方案B 25層</button>
      </div>
      <div class="sim-slider-row">
        <span class="sim-label">樓層</span>
        <span class="sim-value" id="sim-floors">7 層</span>
      </div>
      <input type="range" id="sim-slider" class="sim-slider" min="3" max="40" step="1" value="7" />
      <div class="sim-stats">
        <div class="sim-stat"><span>容積率</span><span id="sim-far">—</span></div>
        <div class="sim-stat"><span>人口</span><span id="sim-pop">—</span></div>
      </div>
      <div class="sim-delta" id="sim-delta"></div>
      <div class="sim-actions">
        <button id="sim-place-btn" class="sim-action-btn">放置建築</button>
        <button id="sim-clear-btn" class="sim-action-btn">清除全部</button>
      </div>
      <div class="sim-note">* 益隆七棟模擬數據，非官方規劃</div>
    </div>
  </div>
  <div id="info-panel" class="panel hidden">
    <div class="panel-header">建築資訊</div>
    <div class="panel-body" id="info-content">點擊建築物查看詳情</div>
  </div>
  <button id="screenshot-btn">📷 截圖</button>
  <div id="legend" class="hidden">
    <div class="legend-header" id="legend-title">圖例</div>
    <div class="legend-bar" id="legend-bar"></div>
    <div class="legend-labels">
      <span id="legend-min">低</span>
      <span id="legend-max">高</span>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
